<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単価比較ツール</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 0.5em;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #fafafa;
    padding-bottom: 240px; /* テンキー分の余白 */
  }

  h1 {
    text-align: center;
    font-size: 1.2em;
    margin: 0.5em 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  th, td {
    padding: 0.4em;
    text-align: center;
    white-space: nowrap;
  }

  th {
    background: #eee;
    font-size: 0.9em;
  }

  .row-label {
    font-weight: bold;
    width: 2em;
  }

  input {
    width: 100%;
    padding: 0.4em;
    font-size: 16px; /* iOSズーム防止 */
    text-align: right;
    appearance: none;
    -webkit-appearance: none;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fff;
  }

  input.active {
    border-color: #007aff;
    background: #eef6ff;
  }

  .result {
    font-weight: bold;
    color: #006400;
  }

  /* ===== テンキー ===== */

  .keypad {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #ddd;
    padding: 0.5em;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.4em;
  }

  .keypad button {
    font-size: 1.3em;
    padding: 0.6em 0;
    border: none;
    border-radius: 8px;
    background: #fff;
  }

  .keypad button:active {
    background: #ccc;
  }

  .keypad .wide {
    grid-column: span 2;
  }
</style>
</head>

<body>

<h1>単価比較ツール</h1>

<table>
  <thead>
    <tr>
      <th></th>
      <th>価格</th>
      <th>容量</th>
      <th>個数</th>
      <th>単価</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<!-- テンキー -->
<div class="keypad">
  <button onclick="pressKey('7')">7</button>
  <button onclick="pressKey('8')">8</button>
  <button onclick="pressKey('9')">9</button>
  <button onclick="pressKey('back')">⌫</button>

  <button onclick="pressKey('4')">4</button>
  <button onclick="pressKey('5')">5</button>
  <button onclick="pressKey('6')">6</button>
  <button onclick="pressKey('.')">.</button>

  <button onclick="pressKey('1')">1</button>
  <button onclick="pressKey('2')">2</button>
  <button onclick="pressKey('3')">3</button>
  <button onclick="pressKey('clear')" class="wide">C</button>

  <button onclick="pressKey('0')" class="wide">0</button>
</div>

<script>
const rows = ['A', 'B', 'C', 'D', 'E'];
const tbody = document.getElementById('table-body');
let activeInput = null;

// 行を生成
rows.forEach(row => {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="row-label">${row}</td>
    <td><input readonly id="price-${row}"></td>
    <td><input readonly id="size-${row}"></td>
    <td><input readonly id="count-${row}" value="1"></td>
    <td id="result-${row}" class="result">-</td>
  `;
  tbody.appendChild(tr);
});

// 入力欄フォーカス管理
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('click', () => {
    document.querySelectorAll('input').forEach(i => i.classList.remove('active'));
    input.classList.add('active');
    activeInput = input;
  });
});

// テンキー処理
function pressKey(key) {
  if (!activeInput) return;

  if (key === 'back') {
    activeInput.value = activeInput.value.slice(0, -1);
  } else if (key === 'clear') {
    activeInput.value = '';
  } else {
    activeInput.value += key;
  }

  activeInput.dispatchEvent(new Event('input'));
}

// 単価計算
function calc() {
  rows.forEach(row => {
    const price = parseFloat(document.getElementById(`price-${row}`).value);
    const size  = parseFloat(document.getElementById(`size-${row}`).value);
    const count = parseFloat(document.getElementById(`count-${row}`).value);
    const cell  = document.getElementById(`result-${row}`);

    if (price > 0 && size > 0 && count > 0) {
      cell.textContent = (price / (size * count)).toFixed(3);
    } else {
      cell.textContent = '-';
    }
  });
}

// 入力イベント監視
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('input', calc);
});
</script>

</body>
</html>
