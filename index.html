<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<title>単価比較Ver.20260110</title>

<style>
  * { box-sizing: border-box; }

  html, body {
    touch-action: manipulation;
    background: #111;
    color: #f2f2f2;
  }

  body {
    margin: 0;
    padding: 0.35em;
    padding-bottom: 300px;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    font-size: 18px;
  }

  h1 {
    text-align: center;
    font-size: 1.25em;
    margin: 0.4em 0 0.5em;
    color: #e5e5e5;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  col.row-col    { width: 26px; }
  col.price-col  { width: 30%; }
  col.size-col   { width: 30%; }
  col.count-col  { width: 15%; }
  col.result-col { width: 25%; }

  th, td {
    padding: 0.32em 0.15em;
    text-align: center;
    white-space: nowrap;
  }

  th {
    background: #1f1f1f;
    font-size: 1.2em;
    color: #ccc;
  }

  .row-label {
    font-weight: bold;
    font-size: 1em;
    color: #fff;
  }

  input {
    width: 100%;
    padding: 0.25em 0.15em;
    font-size: 26px;
    line-height: 1.15;
    text-align: right;
    border: none;
    border-bottom: 1px solid #555;
    background: transparent;
    color: #fff;
  }

  /* ★変更ここ */
  #title-input {
    width: 100%;
    text-align: center;
    resize: none;
    overflow: hidden;
    line-height: 1.1;
    font-size: 1.1em;
    border: none;
    background: transparent;
    color: #fff;
  }

  input.active {
    border-bottom: 2px solid #0a84ff;
    background: rgba(10,132,255,0.15);
  }

  .result-input {
    font-weight: bold;
    font-size: 26px;
    color: #7dff7d;
    cursor: default;
    outline: none;
    border-bottom-color: #ffa500;
  }

  tr.best {
    background: rgba(0, 120, 0, 0.25);
  }

  tr.best .result-input {
    background: rgba(0, 160, 0, 0.35);
    border-radius: 4px;
  }

  .keypad {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #1a1a1a;
    padding: 0.45em;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.45em;
    border-top: 1px solid #333;
  }

  .keypad button {
    font-size: 1.35em;
    padding: 0.45em 0;
    border: 1px solid #333;
    border-radius: 10px;
    background: #222;
    color: #fff;
  }

  .keypad button:active {
    background: #333;
  }

.keypad button.ac-button {
  background: #a00 !important;
  border-color: #c33 !important;
  color: #fff !important;
}

.keypad button.ac-button:active {
  background: #c33 !important;
}

  .span-col-2 { grid-column: span 2; }

  .bottom-title {
    text-align: right;
    font-size: 0.8em;
    margin-top: 6px;
    color: #e5e5e5;
  }
</style>
</head>

<body>

<h1>
  <textarea id="title-input" rows="2"></textarea>
</h1>

<table>
  <colgroup>
    <col class="row-col">
    <col class="price-col">
    <col class="size-col">
    <col class="count-col">
    <col class="result-col">
  </colgroup>

  <thead>
    <tr>
      <th></th>
      <th>価格</th>
      <th>容量</th>
      <th>個数</th>
      <th>単価</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<div class="bottom-title">単価比較Ver.20260320</div>

<div class="keypad">
  <button onclick="pressKey('7')">7</button>
  <button onclick="pressKey('8')">8</button>
  <button onclick="pressKey('9')">9</button>
  <button onclick="pressBack()">←</button>

  <button onclick="pressKey('4')">4</button>
  <button onclick="pressKey('5')">5</button>
  <button onclick="pressKey('6')">6</button>
  <button class="ac-button" onclick="pressAllClear()">AC</button>

  <button onclick="pressKey('1')">1</button>
  <button onclick="pressKey('2')">2</button>
  <button onclick="pressKey('3')">3</button>
  <button onclick="pressClear()">C</button>

  <button class="span-col-2" onclick="pressKey('0')">0</button>
  <button onclick="pressKey('.')">.</button>
  <button onclick="pressEnter()">次</button>
</div>

<script>
/* JSは変更なし */
const rows = ['A','B','C','D','E'];
const cols = ['price','size','count'];
const tbody = document.getElementById('table-body');

let activeInput = null;
let overwrite = false;

rows.forEach((row, r) => {
  const tr = document.createElement('tr');
  tr.dataset.row = r;
  tr.innerHTML = `
    <td class="row-label">${row}</td>
    ${cols.map(c =>
      `<td><input readonly data-row="${r}" data-col="${c}"></td>`
    ).join('')}
    <td><input readonly class="result-input" id="result-${row}" value=""></td>
  `;
  tbody.appendChild(tr);
});

document.querySelectorAll('input:not(.result-input)').forEach(input => {
  input.addEventListener('click', () => {
    document.querySelectorAll('input').forEach(i => i.classList.remove('active'));
    input.classList.add('active');
    activeInput = input;
    overwrite = true;
  });
});

/* 以下省略（元のまま） */
</script>

</body>
</html>
