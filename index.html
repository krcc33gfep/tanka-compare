<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単価比較ツール</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0.5em;
    padding-bottom: 320px;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #fafafa;
  }

  h1 {
    text-align: center;
    font-size: 1.2em;
    margin: 0.5em 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  th, td {
    padding: 0.4em;
    text-align: center;
    white-space: nowrap;
  }

  th {
    background: #eee;
    font-size: 0.9em;
  }

  .row-label {
    width: 1.8em;
    font-weight: bold;
  }

  input {
    width: 100%;
    padding: 0.4em;
    font-size: 16px;
    text-align: right;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fff;
  }

  input.active {
    border-color: #007aff;
    background: #eef6ff;
  }

  .result {
    font-weight: bold;
    color: #006400;
  }

  /* ===== 結果表示 ===== */
  #summary {
    margin-top: 0.8em;
    padding: 0.6em;
    background: #eef6ff;
    border-radius: 8px;
    font-weight: bold;
    min-height: 2.2em;
  }

  /* ===== テンキー ===== */
  .keypad {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #ddd;
    padding: 0.5em;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 1fr;
    gap: 0.4em;
  }

  .keypad button {
    font-size: 1.3em;
    padding: 0.8em 0;
    border: none;
    border-radius: 8px;
    background: #fff;
  }

  .keypad button:active {
    background: #ccc;
  }

  .span-col-2 { grid-column: span 2; }
  .span-row-2 { grid-row: span 2; }
</style>
</head>

<body>

<h1>単価比較ツール</h1>

<table>
  <thead>
    <tr>
      <th></th>
      <th>価格</th>
      <th>容量</th>
      <th>個数</th>
      <th>単価</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<div id="summary">入力してください</div>

<!-- テンキー -->
<div class="keypad">
  <button onclick="pressKey('7')">7</button>
  <button onclick="pressKey('8')">8</button>
  <button onclick="pressKey('9')">9</button>
  <button onclick="pressBack()">BC</button>

  <button onclick="pressKey('4')">4</button>
  <button onclick="pressKey('5')">5</button>
  <button onclick="pressKey('6')">6</button>
  <button onclick="pressClear()">C</button>

  <button onclick="pressKey('1')">1</button>
  <button onclick="pressKey('2')">2</button>
  <button onclick="pressKey('3')">3</button>
  <button class="span-row-2" onclick="pressEnter()">E</button>

  <button class="span-col-2" onclick="pressKey('0')">0</button>
  <button onclick="pressKey('.')">.</button>
</div>

<script>
const rows = ['A', 'B', 'C', 'D', 'E'];
const cols = ['price', 'size', 'count'];
const tbody = document.getElementById('table-body');
const summary = document.getElementById('summary');
let activeInput = null;

// テーブル生成
rows.forEach((row, r) => {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="row-label">${row}</td>
    ${cols.map(c =>
      `<td><input readonly data-row="${r}" data-col="${c}"></td>`
    ).join('')}
    <td id="result-${row}" class="result">-</td>
  `;
  tbody.appendChild(tr);
});

// フォーカス管理
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('click', () => {
    document.querySelectorAll('input').forEach(i => i.classList.remove('active'));
    input.classList.add('active');
    activeInput = input;
  });
});

// ===== テンキー =====
function pressKey(key) {
  if (!activeInput) return;
  activeInput.value += key;
  activeInput.dispatchEvent(new Event('input'));
}

function pressBack() {
  if (!activeInput) return;
  activeInput.value = activeInput.value.slice(0, -1);
  activeInput.dispatchEvent(new Event('input'));
}

function pressClear() {
  if (!activeInput) return;
  activeInput.value = '';
  activeInput.dispatchEvent(new Event('input'));
}

function pressEnter() {
  if (!activeInput) return;
  const row = +activeInput.dataset.row;
  const col = cols.indexOf(activeInput.dataset.col);

  let r = row, c = col + 1;
  if (c >= cols.length) { c = 0; r++; }

  const next = document.querySelector(
    `input[data-row="${r}"][data-col="${cols[c]}"]`
  );
  if (next) next.click();
}

// ===== 計算 & 比較 =====
function calc() {
  const values = [];

  rows.forEach((row, i) => {
    const price = parseFloat(document.querySelector(`input[data-row="${i}"][data-col="price"]`).value);
    const size  = parseFloat(document.querySelector(`input[data-row="${i}"][data-col="size"]`).value);
    const count = parseFloat(document.querySelector(`input[data-row="${i}"][data-col="count"]`).value);
    const cell  = document.getElementById(`result-${row}`);

    if (price > 0 && size > 0 && count > 0) {
      const unit = price / (size * count);
      cell.textContent = unit.toFixed(2);
      values.push({ row, unit });
    } else {
      cell.textContent = '-';
    }
  });

  if (values.length < 2) {
    summary.textContent = '比較するには2つ以上入力してください';
    return;
  }

  values.sort((a, b) => a.unit - b.unit);
  const best = values[0];
  const second = values[1];
  const diff = (second.unit - best.unit).toFixed(2);

  summary.textContent = `${best.row} が ${second.row} より ${diff} 円安い`;
}

document.querySelectorAll('input').forEach(i =>
  i.addEventListener('input', calc)
);
</script>

</body>
</html>
