<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単価比較ツール</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 0.5em;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #fafafa;
  }

  h1 {
    text-align: center;
    font-size: 1.2em;
    margin: 0.5em 0;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  th, td {
    padding: 0.4em;
    text-align: center;
    white-space: nowrap;
  }

  th {
    background: #eee;
    font-size: 0.9em;
  }

  .row-label {
    font-weight: bold;
    width: 2em;
  }

  input {
    width: 100%;
    padding: 0.4em;
    font-size: 16px; /* iOSズーム防止 */
    text-align: right;
    appearance: none;
    -webkit-appearance: none;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fff;
  }

  .result {
    font-weight: bold;
    color: #006400;
  }
</style>
</head>

<body>

<h1>単価比較ツール</h1>

<table>
  <thead>
    <tr>
      <th></th>
      <th>価格</th>
      <th>容量</th>
      <th>個数</th>
      <th>単価</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<script>
const rows = ['A', 'B', 'C', 'D', 'E'];
const tbody = document.getElementById('table-body');

rows.forEach(row => {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="row-label">${row}</td>

    <td>
      <input
        type="text"
        inputmode="decimal"
        pattern="[0-9]*"
        id="price-${row}"
      >
    </td>

    <td>
      <input
        type="text"
        inputmode="decimal"
        pattern="[0-9]*"
        id="size-${row}"
      >
    </td>

    <td>
      <input
        type="text"
        inputmode="numeric"
        pattern="[0-9]*"
        id="count-${row}"
        value="1"
      >
    </td>

    <td id="result-${row}" class="result">-</td>
  `;
  tbody.appendChild(tr);
});

function calc() {
  rows.forEach(row => {
    const price = parseFloat(document.getElementById(`price-${row}`).value);
    const size  = parseFloat(document.getElementById(`size-${row}`).value);
    const count = parseFloat(document.getElementById(`count-${row}`).value);

    const cell = document.getElementById(`result-${row}`);

    if (price > 0 && size > 0 && count > 0) {
      const unit = price / (size * count);
      cell.textContent = unit.toFixed(3);
    } else {
      cell.textContent = '-';
    }
  });
}

document.querySelectorAll('input').forEach(input => {
  input.addEventListener('input', calc);
});
</script>

</body>
</html>
