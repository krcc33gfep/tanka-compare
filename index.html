<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>単価比較ツール</title>

<style>
* { box-sizing: border-box; }

html, body {
  touch-action: manipulation;
}

body {
  margin: 0;
  padding: 0.35em;
  padding-bottom: 300px;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: #111;
  color: #eee;
  font-size: 18px;
}

h1 {
  text-align: center;
  font-size: 1.25em;
  margin: 0.4em 0 0.5em;
  color: #ddd;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

/* ===== 列幅 ===== */
col.row-col    { width: 26px; }
col.price-col  { width: 30%; }
col.size-col   { width: 30%; }
col.count-col  { width: 15%; }
col.result-col { width: 25%; }

th, td {
  padding: 0.32em 0.15em;
  text-align: center;
  white-space: nowrap;
}

th {
  background: #222;
  font-size: 1.2em;
}

.row-label {
  font-weight: bold;
  display: inline-block;
  transform: scaleY(1.3);
  color: #aaa;
}

/* ===== 入力（下線のみ） ===== */
input {
  width: 100%;
  padding: 0.42em 0.15em;
  font-size: 26px;
  line-height: 1.1;
  text-align: right;
  border: none;
  border-bottom: 1px solid #555;
  background: transparent;
  color: #fff;
}

input.active {
  border-bottom: 2px solid #4da3ff;
}

/* ===== 結果 ===== */
.result {
  font-weight: bold;
  font-size: 22px;
  color: #8fdf8f;
}

tr.best {
  background: #1c2a1c;
}

tr.best .result {
  font-size: 24px;
}

/* ===== テンキー ===== */
.keypad {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #222;
  padding: 0.45em;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.45em;
}

.keypad button {
  font-size: 1.35em;
  padding: 0.5em 0;
  border: none;
  border-radius: 10px;
  background: #333;
  color: #fff;
}

.keypad button:active {
  background: #555;
}

/* ACだけ赤 */
.keypad button.ac {
  background: #5a2a2a;
}
.keypad button.ac:active {
  background: #7a3a3a;
}

.span-col-2 { grid-column: span 2; }
</style>
</head>

<body>

<h1>単価比較ツール</h1>

<table>
  <colgroup>
    <col class="row-col">
    <col class="price-col">
    <col class="size-col">
    <col class="count-col">
    <col class="result-col">
  </colgroup>
  <thead>
    <tr>
      <th></th>
      <th>価格</th>
      <th>容量</th>
      <th>個数</th>
      <th>単価</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<!-- ===== テンキー ===== -->
<div class="keypad">
  <button onclick="pressKey('7')">7</button>
  <button onclick="pressKey('8')">8</button>
  <button onclick="pressKey('9')">9</button>
  <button onclick="pressBack()">←</button>

  <button onclick="pressKey('4')">4</button>
  <button onclick="pressKey('5')">5</button>
  <button onclick="pressKey('6')">6</button>
  <button class="ac" onclick="pressAllClear()">AC</button>

  <button onclick="pressKey('1')">1</button>
  <button onclick="pressKey('2')">2</button>
  <button onclick="pressKey('3')">3</button>
  <button onclick="pressClear()">C</button>

  <button class="span-col-2" onclick="pressKey('0')">0</button>
  <button onclick="pressKey('.')">.</button>
  <button onclick="pressEnter()">次</button>
</div>

<script>
const rows = ['A','B','C','D','E'];
const cols = ['price','size','count'];
const tbody = document.getElementById('table-body');

let activeInput = null;
let overwrite = false;

/* ===== テーブル生成 ===== */
rows.forEach((row, r) => {
  const tr = document.createElement('tr');
  tr.dataset.row = r;
  tr.innerHTML = `
    <td class="row-label">${row}</td>
    ${cols.map(c =>
      `<td><input readonly data-row="${r}" data-col="${c}"></td>`
    ).join('')}
    <td class="result" id="result-${row}">-</td>
  `;
  tbody.appendChild(tr);
});

/* ===== フォーカス ===== */
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('click', () => {
    document.querySelectorAll('input').forEach(i =>
      i.classList.remove('active')
    );
    input.classList.add('active');
    activeInput = input;
    overwrite = true;
  });
});

/* ===== テンキー処理 ===== */
function pressKey(key) {
  if (!activeInput) return;
  if (overwrite) {
    activeInput.value = '';
    overwrite = false;
  }
  activeInput.value += key;
  activeInput.dispatchEvent(new Event('input'));
}

function pressBack() {
  if (!activeInput) return;
  activeInput.value = activeInput.value.slice(0, -1);
  activeInput.dispatchEvent(new Event('input'));
}

function pressClear() {
  if (!activeInput) return;
  activeInput.value = '';
  activeInput.dispatchEvent(new Event('input'));
}

function pressEnter() {
  if (!activeInput) return;
  const r = +activeInput.dataset.row;
  const c = cols.indexOf(activeInput.dataset.col);
  let nr = r, nc = c + 1;
  if (nc >= cols.length) { nc = 0; nr++; }
  const next = document.querySelector(
    `input[data-row="${nr}"][data-col="${cols[nc]}"]`
  );
  if (next) next.click();
}

/* ===== フォーカス初期化 ===== */
function focusFirstInput() {
  const first = document.querySelector(
    'input[data-row="0"][data-col="price"]'
  );
  if (first) {
    document.querySelectorAll('input').forEach(i =>
      i.classList.remove('active')
    );
    first.classList.add('active');
    activeInput = first;
    overwrite = true;
  }
}

/* ===== AC ===== */
function pressAllClear() {
  document.querySelectorAll('input').forEach(i => i.value = '');
  document.querySelectorAll('.result').forEach(r => r.textContent = '-');
  document.querySelectorAll('tr').forEach(tr => tr.classList.remove('best'));
  focusFirstInput();
}

/* ===== 計算 ===== */
function calc() {
  const list = [];

  rows.forEach((row, i) => {
    const tr = tbody.querySelector(`tr[data-row="${i}"]`);
    tr.classList.remove('best');

    const price = parseFloat(document.querySelector(`input[data-row="${i}"][data-col="price"]`).value);
    const size  = parseFloat(document.querySelector(`input[data-row="${i}"][data-col="size"]`).value);
    const count = parseFloat(document.querySelector(`input[data-row="${i}"][data-col="count"]`).value);
    const cell  = document.getElementById(`result-${row}`);

    if (price > 0 && size > 0 && count > 0) {
      const unit = price / (size * count);
      cell.textContent = unit.toFixed(2);
      list.push({ unit, tr });
    } else {
      cell.textContent = '-';
    }
  });

  if (!list.length) return;
  list.sort((a, b) => a.unit - b.unit);
  list[0].tr.classList.add('best');
}

document.querySelectorAll('input').forEach(i =>
  i.addEventListener('input', calc)
);

window.addEventListener('load', () => {
  focusFirstInput();
});
</script>

</body>
</html>
