<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               maximum-scale=1.0,
               user-scalable=no">

<title>単価比較Ver.20260110</title>

<style>
  * { box-sizing: border-box; }

  html, body {
    touch-action: manipulation;
    background: #111;
    color: #f2f2f2;
  }

  body {
    margin: 0;
    padding: 0.35em;
    padding-bottom: 300px;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    font-size: 18px;
  }

  h1 {
    text-align: center;
    font-size: 1.25em;
    margin: 0.4em 0 0.5em;
    color: #e5e5e5;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  /* ===== 列幅管理 ===== */
  col.row-col    { width: 26px; }
  col.price-col  { width: 30%; }
  col.size-col   { width: 30%; }
  col.count-col  { width: 15%; }
  col.result-col { width: 25%; }

  th, td {
    padding: 0.32em 0.15em;
    text-align: center;
    white-space: nowrap;
  }

  th {
    background: #1f1f1f;
    font-size: 1.2em;
    color: #ccc;
  }

  .row-label {
    font-weight: bold;
    font-size: 1em;
    color: #fff;
  }

  /* ===== 入力（線だけ） ===== */
  input {
    width: 100%;
    padding: 0.25em 0.15em;
    font-size: 26px;
    line-height: 1.15;
    text-align: right;
    border: none;
    border-bottom: 1px solid #555;
    background: transparent;
    color: #fff;
  }

  input.active {
    border-bottom: 2px solid #0a84ff;
    background: rgba(10,132,255,0.15);
  }

  .result {
    font-weight: bold;
    font-size: 18px;
    color: #7dff7d;
  }

  tr.best {
    background: rgba(0, 120, 0, 0.25);
  }

  tr.best .result {
    background: rgba(0, 160, 0, 0.35);
    border-radius: 4px;
  }

  /* ===== テンキー ===== */
  .keypad {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #1a1a1a;
    padding: 0.45em;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.45em;
    border-top: 1px solid #333;
  }

  .keypad button {
    font-size: 1.35em;
    padding: 0.5em 0;
    border: 1px solid #333;
    border-radius: 10px;
    background: #222;
    color: #fff;
  }

  .keypad button:active {
    background: #333;
  }

  .span-col-2 { grid-column: span 2; }
  .span-row-2 { grid-row: span 2; }
</style>
</head>

<body>

<h1>単価比較Ver.20260110</h1>

<table>
  <colgroup>
    <col class="row-col">
    <col class="price-col">
    <col class="size-col">
    <col class="count-col">
    <col class="result-col">
  </colgroup>

  <thead>
    <tr>
      <th></th>
      <th>価格</th>
      <th>容量</th>
      <th>個数</th>
      <th>単価</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<!-- テンキー -->
<div class="keypad">
  <button onclick="pressKey('7')">7</button>
  <button onclick="pressKey('8')">8</button>
  <button onclick="pressKey('9')">9</button>
  <button onclick="pressBack()">←</button>

  <button onclick="pressKey('4')">4</button>
  <button onclick="pressKey('5')">5</button>
  <button onclick="pressKey('6')">6</button>
  <button onclick="pressClear()">C</button>

  <button onclick="pressKey('1')">1</button>
  <button onclick="pressKey('2')">2</button>
  <button onclick="pressKey('3')">3</button>
  <button class="span-row-2" onclick="pressEnter()">E</button>

  <button class="span-col-2" onclick="pressKey('0')">0</button>
  <button onclick="pressKey('.')">.</button>
</div>

<script>
const rows = ['A','B','C','D','E'];
const cols = ['price','size','count'];
const tbody = document.getElementById('table-body');

let activeInput = null;
let overwrite = false;

// テーブル生成
rows.forEach((row, r) => {
  const tr = document.createElement('tr');
  tr.dataset.row = r;
  tr.innerHTML = `
    <td class="row-label">${row}</td>
    ${cols.map(c =>
      `<td><input readonly data-row="${r}" data-col="${c}"></td>`
    ).join('')}
    <td class="result" id="result-${row}">-</td>
  `;
  tbody.appendChild(tr);
});

// フォーカス
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('click', () => {
    document.querySelectorAll('input').forEach(i => i.classList.remove('active'));
    input.classList.add('active');
    activeInput = input;
    overwrite = true;
  });
});

// ===== テンキー =====
function pressKey(key) {
  if (!activeInput) return;
  if (overwrite) {
    activeInput.value = '';
    overwrite = false;
  }
  activeInput.value += key;
  activeInput.dispatchEvent(new Event('input'));
}

function pressBack() {
  if (!activeInput) return;
  activeInput.value = activeInput.value.slice(0, -1);
  activeInput.dispatchEvent(new Event('input'));
}

function pressClear() {
  if (!activeInput) return;
  activeInput.value = '';
  activeInput.dispatchEvent(new Event('input'));
}

function pressEnter() {
  if (!activeInput) return;
  const r = +activeInput.dataset.row;
  const c = cols.indexOf(activeInput.dataset.col);
  let nr = r, nc = c + 1;
  if (nc >= cols.length) { nc = 0; nr++; }
  const next = document.querySelector(
    `input[data-row="${nr}"][data-col="${cols[nc]}"]`
  );
  if (next) next.click();
}

// ===== 計算 & 最安ハイライト =====
function calc() {
  const list = [];

  rows.forEach((row, i) => {
    const tr = tbody.querySelector(`tr[data-row="${i}"]`);
    tr.classList.remove('best');

    const price = parseFloat(document.querySelector(`input[data-row="${i}"][data-col="price"]`).value);
    const size  = parseFloat(document.querySelector(`input[data-row="${i}"][data-col="size"]`).value);
    const count = parseFloat(document.querySelector(`input[data-row="${i}"][data-col="count"]`).value);
    const cell  = document.getElementById(`result-${row}`);

    if (price > 0 && size > 0 && count > 0) {
      const unit = price / (size * count);
      cell.textContent = unit.toFixed(2);
      list.push({ unit, tr });
    } else {
      cell.textContent = '-';
    }
  });

  if (!list.length) return;

  list.sort((a, b) => a.unit - b.unit);
  list[0].tr.classList.add('best');
}

document.querySelectorAll('input').forEach(i =>
  i.addEventListener('input', calc)
);
window.addEventListener('load', () => {
  const first = document.querySelector(
    'input[data-row="0"][data-col="price"]'
  );
  if (first) {
    first.classList.add('active');
    activeInput = first;
    overwrite = true;
  }
});
</script>

</body>
</html>
